services:
  postara:
    image: "${POSTARA_IMAGE:-postara:0.1.0}"
    build:
      context: .
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql+asyncpg://postara@postgres:5432/postara
      APP_DATABASE_URL: postgresql+asyncpg://postara@postgres:5432/postara
      AUDIT_DATABASE_URL: postgresql+asyncpg://postara@postgres:5432/postara
      DB_PASSWORD_FILE: /etc/postara/secrets/db_password.txt
      DB_HOST: postgres
      DB_PORT: "5432"
      POSTGRES_DB: postara
      POSTGRES_USER: postara
      APP_SCHEMA: app
      AUDIT_SCHEMA: audit
      POSTARA_CONFIG: /etc/postara/postara.toml
      POSTARA_SECRETS_DIR: /etc/postara/secrets
      IMAP_WORKERS: "8"
    volumes:
      - ./secrets:/etc/postara/secrets:ro
      - ${POSTARA_CONFIG_FILE:-./config/postara.toml.example}:/etc/postara/postara.toml:ro
    ports:
      - "${POSTARA_HOST_BIND:-127.0.0.1}:${POSTARA_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import json, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); raise SystemExit(0 if r.status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postara
      POSTGRES_USER: postara
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postara", "-d", "postara"]
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pgdata:
    driver: local
